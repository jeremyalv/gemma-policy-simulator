<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" width="960" height="520"
     font-family="'Segoe UI', system-ui, sans-serif">

  <!-- ── Background ── -->
  <rect width="960" height="520" fill="#FAFAF8" rx="12"/>

  <!-- ── Title ── -->
  <text x="480" y="42" text-anchor="middle" font-size="20" font-weight="700"
        fill="#0B1F3A" letter-spacing="-0.3">InfiniPol — Local-First Architecture</text>
  <text x="480" y="64" text-anchor="middle" font-size="13" fill="#6B7280">
    All inference and data stays on-device. No cloud, no telemetry.
  </text>

  <!-- ════════════════════════════════════════════════════════════════════════
       ROW 1: Browser  →  Frontend (React/Vite)
  ═══════════════════════════════════════════════════════════════════════════ -->

  <!-- Browser box -->
  <rect x="40" y="90" width="160" height="80" rx="10" fill="#FFFFFF"
        stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="120" y="124" text-anchor="middle" font-size="22">🌐</text>
  <text x="120" y="146" text-anchor="middle" font-size="13" font-weight="600"
        fill="#0B1F3A">Policy Analyst</text>
  <text x="120" y="162" text-anchor="middle" font-size="11" fill="#6B7280">Browser</text>

  <!-- Arrow: Browser → FE -->
  <line x1="200" y1="130" x2="268" y2="130" stroke="#D4A24C" stroke-width="2"
        marker-end="url(#arrow)"/>
  <text x="234" y="122" text-anchor="middle" font-size="10" fill="#6B7280">HTTP</text>

  <!-- Frontend box -->
  <rect x="268" y="90" width="200" height="80" rx="10" fill="#EEF2FF"
        stroke="#A5B4FC" stroke-width="1.5"/>
  <text x="368" y="118" text-anchor="middle" font-size="12" font-weight="700"
        fill="#3730A3" letter-spacing="0.3">FRONTEND</text>
  <text x="368" y="136" text-anchor="middle" font-size="11" fill="#0B1F3A">React + Vite + Mantine</text>
  <text x="368" y="152" text-anchor="middle" font-size="10" fill="#6B7280">TanStack Query · Polling</text>
  <text x="368" y="164" text-anchor="middle" font-size="10" fill="#6B7280">localhost:5173</text>

  <!-- Arrow: FE → BE -->
  <line x1="468" y1="130" x2="536" y2="130" stroke="#D4A24C" stroke-width="2"
        marker-end="url(#arrow)"/>
  <text x="502" y="122" text-anchor="middle" font-size="10" fill="#6B7280">REST/JSON</text>

  <!-- Backend box -->
  <rect x="536" y="90" width="200" height="80" rx="10" fill="#F0FDF4"
        stroke="#6EE7B7" stroke-width="1.5"/>
  <text x="636" y="118" text-anchor="middle" font-size="12" font-weight="700"
        fill="#2D6A4F" letter-spacing="0.3">BACKEND API</text>
  <text x="636" y="136" text-anchor="middle" font-size="11" fill="#0B1F3A">FastAPI + Uvicorn</text>
  <text x="636" y="152" text-anchor="middle" font-size="10" fill="#6B7280">Simulation worker · Async</text>
  <text x="636" y="164" text-anchor="middle" font-size="10" fill="#6B7280">localhost:8000</text>

  <!-- ════════════════════════════════════════════════════════════════════════
       ROW 2: Backend fan-out → Ollama · SQLite · Dataset · Artifacts
  ═══════════════════════════════════════════════════════════════════════════ -->

  <!-- Vertical connector from BE down -->
  <line x1="636" y1="170" x2="636" y2="250" stroke="#E5E7EB" stroke-width="1.5"
        stroke-dasharray="4 3"/>

  <!-- Horizontal spine -->
  <line x1="200" y1="280" x2="880" y2="280" stroke="#E5E7EB" stroke-width="1.5"
        stroke-dasharray="4 3"/>

  <!-- Drop lines to each store -->
  <!-- Ollama drop -->
  <line x1="270" y1="250" x2="270" y2="290" stroke="#E5E7EB" stroke-width="1.5"
        stroke-dasharray="4 3"/>
  <!-- SQLite drop -->
  <line x1="450" y1="250" x2="450" y2="290" stroke="#E5E7EB" stroke-width="1.5"
        stroke-dasharray="4 3"/>
  <!-- Dataset drop -->
  <line x1="636" y1="250" x2="636" y2="290" stroke="#E5E7EB" stroke-width="1.5"
        stroke-dasharray="4 3"/>
  <!-- Artifacts drop -->
  <line x1="820" y1="250" x2="820" y2="290" stroke="#E5E7EB" stroke-width="1.5"
        stroke-dasharray="4 3"/>

  <!-- ── Ollama box ── -->
  <rect x="158" y="290" width="224" height="100" rx="10" fill="#0B1F3A"
        stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="270" y="320" text-anchor="middle" font-size="22">🦙</text>
  <text x="270" y="342" text-anchor="middle" font-size="13" font-weight="700"
        fill="#FFFFFF">Ollama</text>
  <text x="270" y="358" text-anchor="middle" font-size="11" fill="#94A3B8">gemma4:e4b · Local LLM</text>
  <text x="270" y="374" text-anchor="middle" font-size="10" fill="#D4A24C">localhost:11434</text>

  <!-- ── SQLite box ── -->
  <rect x="338" y="290" width="224" height="100" rx="10" fill="#FFFFFF"
        stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="450" y="320" text-anchor="middle" font-size="22">🗄️</text>
  <text x="450" y="342" text-anchor="middle" font-size="13" font-weight="700"
        fill="#0B1F3A">SQLite (WAL)</text>
  <text x="450" y="358" text-anchor="middle" font-size="11" fill="#6B7280">Simulation lifecycle</text>
  <text x="450" y="374" text-anchor="middle" font-size="10" fill="#6B7280">sims.db · busy_timeout 30s</text>

  <!-- ── Dataset box ── -->
  <rect x="524" y="290" width="224" height="100" rx="10" fill="#FFFFFF"
        stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="636" y="320" text-anchor="middle" font-size="22">👥</text>
  <text x="636" y="342" text-anchor="middle" font-size="13" font-weight="700"
        fill="#0B1F3A">Nemotron Personas</text>
  <text x="636" y="358" text-anchor="middle" font-size="11" fill="#6B7280">1M synthetic US personas</text>
  <text x="636" y="374" text-anchor="middle" font-size="10" fill="#6B7280">Local JSONL · mtime-cached</text>

  <!-- ── Artifacts box ── -->
  <rect x="708" y="290" width="224" height="100" rx="10" fill="#FFFFFF"
        stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="820" y="320" text-anchor="middle" font-size="22">📄</text>
  <text x="820" y="342" text-anchor="middle" font-size="13" font-weight="700"
        fill="#0B1F3A">Run Artifacts</text>
  <text x="820" y="358" text-anchor="middle" font-size="11" fill="#6B7280">Raw responses · JSON</text>
  <text x="820" y="374" text-anchor="middle" font-size="10" fill="#6B7280">CSV export on demand</text>

  <!-- ════════════════════════════════════════════════════════════════════════
       ROW 3: Capabilities legend
  ═══════════════════════════════════════════════════════════════════════════ -->

  <!-- Legend bar -->
  <rect x="40" y="430" width="880" height="68" rx="10" fill="#F3F4F6"
        stroke="#E5E7EB" stroke-width="1"/>

  <text x="480" y="452" text-anchor="middle" font-size="11" font-weight="700"
        fill="#6B7280" letter-spacing="1">KEY FLOWS</text>

  <!-- Flow pills -->
  <!-- 1 -->
  <rect x="60"  y="460" width="160" height="24" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <text x="140" y="476" text-anchor="middle" font-size="10" fill="#0B1F3A">📝  Create &amp; Configure</text>
  <!-- 2 -->
  <rect x="232" y="460" width="160" height="24" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <text x="312" y="476" text-anchor="middle" font-size="10" fill="#0B1F3A">⚡  Run Simulation</text>
  <!-- 3 -->
  <rect x="404" y="460" width="160" height="24" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <text x="484" y="476" text-anchor="middle" font-size="10" fill="#0B1F3A">📊  Inspect Results</text>
  <!-- 4 -->
  <rect x="576" y="460" width="160" height="24" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <text x="656" y="476" text-anchor="middle" font-size="10" fill="#0B1F3A">🔁  Challenge &amp; Refine</text>
  <!-- 5 -->
  <rect x="748" y="460" width="152" height="24" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <text x="824" y="476" text-anchor="middle" font-size="10" fill="#0B1F3A">⬇️  Export CSV</text>

  <!-- ── Arrow marker ── -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#D4A24C"/>
    </marker>
  </defs>

</svg>
